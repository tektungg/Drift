<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<title>Drift — Help & About mockup</title>
<link rel="stylesheet" href="../src/styles.css">
<style>
  body { padding: 0; background: var(--bg); }
  .theme-toggle { position: fixed; top: 12px; left: 14px; z-index: 60; font-size: 12px;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink); border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  .tabbtn { position: fixed; top: 12px; left: 120px; z-index: 60; font-size: 12px;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink); border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  /* render the real settings panel open, side by side won't fit; show one at a time */
  .settings-panel { transform: none !important; box-shadow: -8px 0 30px rgba(0,0,0,.12); }

  /* ---- proposed new styles ---- */
  .settings-tabs { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--line);
    border-radius: 9px; padding: 3px; margin-bottom: 18px; }
  .settings-tabs .tab { flex: 1; text-align: center; padding: 7px 0; border-radius: 6px; font-size: 13px;
    color: var(--ink-soft); cursor: pointer; border: 0; background: transparent; font-family: var(--font-sans); }
  .settings-tabs .tab:hover { color: var(--ink); }
  .settings-tabs .tab.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }

  .help-intro { font-size: 13px; color: var(--ink-soft); margin-bottom: 14px; line-height: 1.5; }
  .help-item { border-bottom: 1px solid var(--line); }
  .help-item summary { cursor: pointer; padding: 11px 2px; font-size: 13px; color: var(--ink);
    list-style: none; display: flex; align-items: center; gap: 8px; }
  .help-item summary::-webkit-details-marker { display: none; }
  .help-item summary .arno { margin-left: auto; color: var(--ink-soft); transition: transform .15s ease; }
  .help-item[open] summary .arno { transform: rotate(90deg); }
  .help-item .body { font-size: 12.5px; color: var(--ink-soft); line-height: 1.6; padding: 2px 2px 12px; }
  .help-links { display: flex; gap: 8px; margin-top: 18px; }

  .about { text-align: center; padding: 12px 0 4px; }
  .about .glyph { width: 64px; height: 64px; margin: 8px auto 14px; color: var(--accent); }
  .about .glyph svg { width: 64px; height: 64px; }
  .about h3 { font-family: var(--font-serif); font-weight: 500; font-size: 22px; margin: 0 0 2px; }
  .about .ver { font-size: 12px; color: var(--ink-soft); margin-bottom: 12px; }
  .about .tag { font-size: 13px; color: var(--ink); margin: 0 auto 20px; max-width: 280px; line-height: 1.5; }
  .about-links { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .about-links a { display: flex; align-items: center; justify-content: center; gap: 8px;
    text-decoration: none; color: var(--ink); border: 1px solid var(--line); background: var(--surface);
    border-radius: 8px; padding: 9px; font-size: 13px; cursor: pointer; }
  .about-links a:hover { border-color: var(--accent); }
  .about-links a svg { width: 15px; height: 15px; color: var(--ink-soft); }
  .about .credits { font-size: 11px; color: var(--ink-soft); line-height: 1.6; }
  .ic { display: inline-flex; }
  .ic svg { width: 15px; height: 15px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="document.documentElement.dataset.theme = document.documentElement.dataset.theme==='dark'?'light':'dark'">Theme</button>
<button class="tabbtn" id="swap">Show: About</button>

<div class="settings-panel open" id="panel"></div>

<script>
  const wave = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8c2 0 2 2 4 2s2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2"/><path d="M2 14c2 0 2 2 4 2s2-2 4-2 2 2 4 2 2-2 4-2 2 2 4 2"/></svg>';
  const link = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
  const chev = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';

  function tabs(active) {
    return `<div class="settings-tabs">
      <button class="tab ${active==='settings'?'active':''}">Settings</button>
      <button class="tab ${active==='help'?'active':''}">Help</button>
      <button class="tab ${active==='about'?'active':''}">About</button>
    </div>`;
  }
  function helpItem(q, a, open) {
    return `<details class="help-item" ${open?'open':''}><summary>${q}<span class="arno">${chev}</span></summary><div class="body">${a}</div></details>`;
  }
  function helpView() {
    return tabs('help') +
      `<p class="help-intro">Quick answers to get the most out of Drift.</p>` +
      helpItem("Adding torrents", "Paste a magnet link, drag a <b>.torrent</b> file onto the window, click <b>+ Add torrent</b> to browse, or just copy a magnet — Drift watches your clipboard and offers to add it.", true) +
      helpItem("Where downloads go", "Files are auto-sorted into category folders (Video, Audio, Documents, …). Folder-style torrents go to <b>Other/&lt;name&gt;</b>. Change the destination per-torrent in the Add dialog, or set the default folder above.") +
      helpItem("Picking which files", "Uncheck files you don't want in the Add dialog, or expand a row to change the selection even mid-download.") +
      helpItem("The download queue", "Set <b>Max active downloads</b> in Settings; extras wait as <b>Queued</b> and start automatically as slots free up. Right-click a torrent to <b>Force start</b> (bypass the cap) or reorder its priority.") +
      helpItem("Selecting several at once", "Ctrl-click to pick multiple torrents, Shift-click for a range, then use the action bar to pause, resume or remove them together.") +
      helpItem("Magnet links from your browser", "Turn on <b>Open magnet links with Drift</b> in Settings, then clicking a magnet anywhere opens Drift with the Add dialog ready.") +
      helpItem("Seeding & opening files", "Completed files stay shared with other peers — and you can open or run them <b>while Drift keeps seeding</b>.") +
      helpItem("Closing to the tray", "Closing the window keeps Drift seeding in the system tray. Click the tray icon to bring it back.") +
      `<div class="help-links">
        <a class="about-links-x"></a>
      </div>
      <div class="help-links">
        <a style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none; color:var(--ink); border:1px solid var(--line); background:var(--surface); border-radius:8px; padding:9px; font-size:13px; cursor:pointer">${link} Full guide on GitHub</a>
        <a style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none; color:var(--ink); border:1px solid var(--line); background:var(--surface); border-radius:8px; padding:9px; font-size:13px; cursor:pointer">Report an issue</a>
      </div>`;
  }
  function aboutView() {
    return tabs('about') +
      `<div class="about">
        <div class="glyph">${wave}</div>
        <h3>Drift</h3>
        <div class="ver">Version 0.4.0</div>
        <p class="tag">A clean, fast, native Windows torrent client with a warm, Claude-inspired interface.</p>
        <div class="about-links">
          <a>${link} GitHub repository</a>
          <a>${link} Releases · check for updates</a>
          <a>${link} License (MIT)</a>
        </div>
        <div class="credits">Built with Tauri 2 · Rust · librqbit<br>Not affiliated with Anthropic — just a fan of the aesthetic.</div>
      </div>`;
  }
  let cur = 'help';
  function render(){ document.getElementById('panel').innerHTML = cur==='about'?aboutView():helpView(); }
  document.getElementById('swap').onclick = () => { cur = cur==='help'?'about':'help'; document.getElementById('swap').textContent = 'Show: ' + (cur==='help'?'About':'Help'); render(); };
  render();
</script>
</body>
</html>
