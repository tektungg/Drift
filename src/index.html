<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Drift</title>
  <!-- Apply the saved theme before first paint to avoid a flash. main.js
       reconciles this with the persisted config on load. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("drift-theme") || "system";
        var dark = t === "dark" ||
          (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="main-head">
        <h1 id="main-title">All downloads</h1>
        <div class="list-controls">
          <input type="text" id="list-search" class="list-search" placeholder="Search…" autocomplete="off" spellcheck="false">
          <select id="list-sort" class="list-sort" title="Sort by">
            <option value="added">Date added</option>
            <option value="name">Name</option>
            <option value="progress">Progress</option>
            <option value="speed">Speed</option>
            <option value="size">Size</option>
          </select>
          <button id="list-sortdir" class="list-sortdir" title="Toggle direction">↓</button>
        </div>
        <button class="btn-primary" id="btn-add">+ Add torrent</button>
      </div>
      <div id="torrent-list"></div>
    </main>
  </div>
  <div class="toast-stack" id="toasts"></div>
  <div id="modal-root"></div>
  <div class="settings-panel" id="settings-panel"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
