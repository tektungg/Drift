<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css"></head>
<body style="padding: 14px 16px;">
  <div style="font-size:13px; margin-bottom:4px; color: var(--ink);">
    Magnet link detected. Do you want to download this?
  </div>
  <div id="t-name" style="font-size:11px; margin-bottom:10px; color: var(--ink-soft);

    <button class="btn-ghost" id="t-dismiss">Dismiss</button>
    <button class="btn-primary" id="t-add">Yes</button>
  </div>
  <script type="module" src="toast.js"></script>
