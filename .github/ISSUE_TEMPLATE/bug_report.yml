name: Bug report
description: Something in Drift isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. Please fill in what you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: e.g. I clicked Add torrent, pasted a magnet, and nothing downloaded.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Drift version
      description: See Settings → About.
      placeholder: e.g. 0.4.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 23H2
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, error toasts, or notes. Do NOT paste magnet links or personal data.
    validations:
      required: false
