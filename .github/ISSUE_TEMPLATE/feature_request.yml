name: Feature request
description: Suggest an idea or improvement for Drift
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or need?
      description: What are you trying to do that Drift makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like instead?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false
