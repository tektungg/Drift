name: Release

# Push a version tag (e.g. v0.4.1) to build the Windows installers and create a
# DRAFT GitHub release with them attached. Review/edit the notes, then publish.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Builds the app (cargo tauri build), then creates/updates the release for
      # this tag and uploads the NSIS .exe + MSI bundles. No JS install step:
      # the frontend is static (frontendDist = ../src) with no lockfile.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Drift ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
